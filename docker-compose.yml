version: '3.8'
services:
  questdb:
    image: questdb/questdb:8.0.0
    ports:
      - "9000:9000"
      - "9009:9009" # ILP
      - "8812:8812" # PostgreSQL
      - "9003:9003" # Min health server
    environment:
      - QDB_CAIRO_COMMIT_MODE=async
    volumes:
      - questdb_data:/root/.questdb

  rust-ingest:
    build:
      context: ./ingest
    depends_on:
      - questdb
    volumes:
      - aeron_shm:/dev/shm

  flink-jobmanager:
    image: flink:1.20
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: flink:1.20
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - aeron_shm:/dev/shm
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=nexus
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  cockroachdb:
    image: cockroachdb/cockroach:v23.1.5
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroachdb_data:/cockroach/cockroach-data

  auth-service:
    build:
      context: ./auth
    ports:
      - "8000:8000"
    depends_on:
      - cockroachdb

  signal-engine:
    build:
      context: ./signal
    ports:
      - "8001:8001"
    depends_on:
      - timescaledb

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  questdb_data:
  timescaledb_data:
  cockroachdb_data:
  aeron_shm:
    driver_opts:
      type: tmpfs
      device: tmpfs
