apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal
  namespace: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signal
  template:
    metadata:
      labels:
        app: signal
    spec:
      containers:
        - name: signal
          image: nexus-signal:latest
          ports:
            - containerPort: 8001
          env:
            - name: QUESTDB_HOST
              value: "questdb"
            - name: QUESTDB_PG_PORT
              value: "8812"
            - name: QUESTDB_USER
              value: "admin"
            - name: QUESTDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: questdb-secrets
                  key: password
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: CORS_ORIGINS
              value: "http://localhost:80"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: signal
  namespace: nexus
spec:
  selector:
    app: signal
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: signal-pdb
  namespace: nexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: signal
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: signal-hpa
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: signal
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
