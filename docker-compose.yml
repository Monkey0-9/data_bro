version: '3.8'
services:
  questdb:
    image: questdb/questdb:8.0.0
    ports:
      - "9000:9000"
      - "9009:9009" # ILP
      - "8812:8812" # PostgreSQL
      - "9003:9003" # Min health server
    environment:
      - QDB_CAIRO_COMMIT_MODE=async
    volumes:
      - questdb_data:/root/.questdb

  rust-ingest:
    build:
      context: ./ingest
    depends_on:
      - questdb
    volumes:
      - aeron_shm:/dev/shm

  flink-jobmanager:
    image: flink:1.20
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: flink:1.20
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - aeron_shm:/dev/shm
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

volumes:
  questdb_data:
  aeron_shm:
    driver_opts:
      type: tmpfs
      device: tmpfs
