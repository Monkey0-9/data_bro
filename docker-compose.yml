services:
  questdb:
    image: questdb/questdb:8.0.0
    environment:
      - QDB_CAIRO_COMMIT_MODE=async
    volumes:
      - questdb_data:/root/.questdb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - nexus

  aeron-md:
    image: real-logic/aeron-all:1.44.1
    ports:
      - "40123:40123/udp"
    environment:
      - AERON_DIR=/dev/shm/aeron
    volumes:
      - aeron_shm:/dev/shm
    restart: unless-stopped
    networks:
      - nexus

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nexus

  ingest:
    build:
      context: ./ingest
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_ILP_PORT=9009
      - TICKS_CSV=/app/data/ticks.csv
      - RUST_LOG=info
    volumes:
      - ./data/ticks.csv:/app/data/ticks.csv:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nexus

  auth:
    build:
      context: ./auth
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - CORS_ORIGINS=http://localhost:80
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nexus

  signal:
    build:
      context: ./signal
    ports:
      - "8001:8001"
    depends_on:
      questdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=${QUESTDB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nexus

  backtest:
    build:
      context: ./backtest
    ports:
      - "8003:8003"
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=${QUESTDB_PASSWORD}
      - CORS_ORIGINS=http://localhost:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nexus

  risk:
    build:
      context: ./risk
    ports:
      - "8002:8002"
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PG_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=${QUESTDB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=http://localhost:80
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - nexus

  stream:
    build:
      context: ./stream
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_ILP_PORT=9009
      - AERON_CHANNEL=aeron:udp
      - AERON_STREAM_ID=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - nexus

  cpp-signal:
    build:
      context: ./cpp_signals
    depends_on:
      questdb:
        condition: service_healthy
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PG_PORT=8812
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nexus

  gpu-sentiment:
    build:
      context: ./gpu_sentiment
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    networks:
      - nexus

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.prod
    depends_on:
      - auth
      - signal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nexus

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth:
        condition: service_healthy
      signal:
        condition: service_healthy
      risk:
        condition: service_healthy
      backtest:
        condition: service_healthy
      ui:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - nexus

volumes:
  questdb_data:
  postgres_data:
  aeron_shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=256m"

networks:
  nexus:
    driver: bridge
