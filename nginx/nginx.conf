events {
    worker_connections 1024;
}

http {
    upstream auth {
        server auth:8000;
    }
    upstream signal {
        server signal:8001;
    }
    upstream risk {
        server risk:8002;
    }
    upstream backtest {
        server backtest:8003;
    }
    upstream ui {
        server ui:80;
    }

    server {
        listen 80;

        location /api/auth/ {
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/signal/ {
            rewrite ^/api/signal/(.*) /$1 break;
            proxy_pass http://signal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/risk/ {
            rewrite ^/api/risk/(.*) /$1 break;
            proxy_pass http://risk;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/backtest/ {
            rewrite ^/api/backtest/(.*) /$1 break;
            proxy_pass http://backtest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws/signals {
            proxy_pass http://signal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
