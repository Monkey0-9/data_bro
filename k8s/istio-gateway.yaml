apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nexus-gateway
  namespace: nexus
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nexus-vs
  namespace: nexus
spec:
  hosts:
    - "*"
  gateways:
    - nexus-gateway
  http:
    - match:
        - uri:
            prefix: /api/auth
      route:
        - destination:
            host: auth
            port:
              number: 8000
    - match:
        - uri:
            prefix: /api/signal
      route:
        - destination:
            host: signal
            port:
              number: 8001
    - match:
        - uri:
            prefix: /api/risk
      route:
        - destination:
            host: risk
            port:
              number: 8002
    - match:
        - uri:
            prefix: /api/backtest
      route:
        - destination:
            host: backtest
            port:
              number: 8003
    - match:
        - uri:
            prefix: /ws/signals
      route:
        - destination:
            host: signal
            port:
              number: 8001
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: ui
            port:
              number: 80
