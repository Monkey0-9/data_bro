apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  rules:
    - host: nexus.local
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8000
          - path: /api/signal
            pathType: Prefix
            backend:
              service:
                name: signal
                port:
                  number: 8001
          - path: /ws/signals
            pathType: Prefix
            backend:
              service:
                name: signal
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80
