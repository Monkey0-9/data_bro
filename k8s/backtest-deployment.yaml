apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest
  namespace: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtest
  template:
    metadata:
      labels:
        app: backtest
    spec:
      containers:
        - name: backtest
          image: nexus-backtest:latest
          env:
            - name: QUESTDB_HOST
              value: "questdb"
            - name: QUESTDB_PG_PORT
              value: "8812"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: backtest
  namespace: nexus
spec:
  selector:
    app: backtest
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backtest-pdb
  namespace: nexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backtest
