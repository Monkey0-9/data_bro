apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-signal
  namespace: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpp-signal
  template:
    metadata:
      labels:
        app: cpp-signal
    spec:
      containers:
        - name: cpp-signal
          image: nexus-cpp-signal:latest
          ports:
            - containerPort: 8004
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: cpp-signal
  namespace: nexus
spec:
  selector:
    app: cpp-signal
  ports:
    - port: 8004
      targetPort: 8004
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cpp-signal-pdb
  namespace: nexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cpp-signal
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cpp-signal-hpa
  namespace: nexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cpp-signal
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
