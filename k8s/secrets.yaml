apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  postgres-user: "nexus"
  postgres-password: "CHANGE_ME_IN_PRODUCTION"
  postgres-db: "nexus"
  database-url: "postgresql://nexus:CHANGE_ME_IN_PRODUCTION@postgres:5432/nexus"
  secret-key: "CHANGE_ME_TO_256_BIT_HEX"
